{{ template "head" . }}
<body>
{{ template "nav" . }}
<main class="container">
<div class="page-header">
    <h1>New Domain</h1>
    <a href="/domains" class="btn">Back</a>
</div>

{{ if .Error }}
<div class="alert alert-error">{{ .Error }}</div>
{{ end }}

<form method="post" action="/domains" class="form-grid">
    <div class="form-group">
        <label>Domain</label>
        <input type="text" name="domain" required placeholder="auto-hub.ca">
    </div>
    <div class="form-group form-check">
        <label><input type="checkbox" name="is_default"> Set as default domain</label>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Domain</button>
    </div>
</form>
</main>
</body>
</html>
