{{ define "head" }}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} — Auto-Hub Mail</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
{{ end }}

{{ define "nav" }}
{{ if .User }}
<nav class="navbar">
    <div class="nav-brand">
        <a href="/">Auto-Hub Mail</a>
    </div>
    <div class="nav-links">
        <div class="user-menu">
            <button type="button" class="user-menu-btn" onclick="document.getElementById('userMenu').classList.toggle('show')">
                {{ .User.FullName }}
            </button>
            <div class="user-menu-dropdown" id="userMenu">
                {{ if eq .User.Role "operator" }}
                <a href="/users">Users</a>
                <a href="/mailboxes">Mailboxes</a>
                <a href="/domains">Domains</a>
                <div class="menu-divider"></div>
                <form method="post" action="/operator/logout" class="menu-logout">
                    <button type="submit">Logout</button>
                </form>
                {{ else if eq .User.Role "admin" }}
                <a href="/inbox">Inbox</a>
                <a href="/mailboxes">Mailboxes</a>
                <div class="menu-divider"></div>
                <form method="post" action="/logout" class="menu-logout">
                    <button type="submit">Logout</button>
                </form>
                {{ else }}
                <a href="/inbox">Inbox</a>
                <div class="menu-divider"></div>
                <form method="post" action="/logout" class="menu-logout">
                    <button type="submit">Logout</button>
                </form>
                {{ end }}
            </div>
        </div>
    </div>
</nav>
{{ end }}
{{ end }}
