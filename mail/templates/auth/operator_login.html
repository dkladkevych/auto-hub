{{ template "head" . }}
<body>
<main class="container">
<div class="auth-box">
    <h1>Operator Access</h1>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Mail Control Plane</p>

    {{ if .Error }}
    <div class="alert alert-error">{{ .Error }}</div>
    {{ end }}

    <form method="post" action="{{.OperatorLoginPath}}">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required autofocus placeholder="Enter operator password">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </div>
    </form>
</div>
</main>
</body>
</html>
