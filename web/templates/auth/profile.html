{{ define "title" }}Profile | Auto-Hub{{ end }}
{{ define "content" }}
<div class="auth-box">
    <div class="auth-box-inner">
        <h2>Profile</h2>

        <p style="margin: 0 0 8px;"><strong>Email:</strong> {{ .User.Email }}</p>
        {{ if .User.FullName }}
            <p style="margin: 0 0 16px;"><strong>Name:</strong> {{ .User.FullName }}</p>
        {{ end }}

        <form method="POST" action="/logout" class="form-card">
            <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
            <button type="submit">Log Out</button>
        </form>
    </div>
</div>
{{ end }}
